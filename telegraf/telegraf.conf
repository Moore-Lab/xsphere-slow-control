# =============================================================================
# Telegraf configuration for xsphere slow control system
#
# Role: subscribe to all xsphere/# MQTT topics and write to InfluxDB 2.x.
#       This replaces the Node-RED parse→influxdb-node pipeline.
#
# Deploy: add the telegraf service to IOTstack and mount this file at
#         /etc/telegraf/telegraf.conf inside the container. Pass the
#         variables from .env into the container environment.
#
# MQTT topic schema (published by slowcontrol Python service and ESP32s):
#
#   xsphere/sensors/temperature/{source}/{type}/{channel}
#     source : plc | omega
#     type   : rtd | tc
#     channel: 1-4
#     payload: {"value_k": <float>, "value_c": <float>}
#
#   xsphere/sensors/pressure/{source}/{gauge}/{channel}
#     source : ghs
#     gauge  : setra | penningvac
#     channel: 1-3 (setra), 1-2 (penningvac)
#     payload: {"value": <float>}   [unit: mbar]
#
#   xsphere/sensors/level/{vessel}
#     vessel : cryostat | primary_xe | ballast
#     payload: {"raw": <float>, "filtered": <float>}   [0-10 scale]
#
#   xsphere/sensors/environment/ghs/{parameter}
#     parameter: humidity | temperature | baro_pressure
#     payload: {"value": <float>}
#
#   xsphere/status/pid/{zone}
#     zone: top | bottom | nozzle
#     payload: {"setpoint_k": <f>, "pv_k": <f>, "output_pct": <f>,
#               "kp": <f>, "ki": <f>, "kd": <f>}
#
#   xsphere/status/valve/{vessel}
#     vessel: cryostat | primary_xe | ballast
#     payload: {"state": 0|1, "desired": 0|1,
#               "auto_close": 0|1, "auto_open": 0|1}
#
#   xsphere/status/service/heartbeat
#     payload: {"uptime_s": <int>}
#
# Commands (xsphere/commands/#) are NOT stored — Telegraf ignores them.
# =============================================================================

[global_tags]
  system = "xsphere"

[agent]
  interval          = "5s"
  round_interval    = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  flush_interval    = "5s"
  precision         = "1s"
  hostname          = ""
  omit_hostname     = true

# ---------------------------------------------------------------------------
# Output: InfluxDB v2
# ---------------------------------------------------------------------------
[[outputs.influxdb_v2]]
  urls         = ["${INFLUX_URL}"]
  token        = "${INFLUX_TOKEN}"
  organization = "${INFLUX_ORG}"
  bucket       = "${INFLUX_BUCKET}"

# ---------------------------------------------------------------------------
# Input 1: Temperature sensors
# Topics : xsphere/sensors/temperature/{source}/{type}/{channel}
# Measurement: temperature
# Tags   : source, sensor_type, channel
# Fields : value_k (Kelvin), value_c (Celsius)
# ---------------------------------------------------------------------------
[[inputs.mqtt_consumer]]
  servers  = ["tcp://${MQTT_HOST}:${MQTT_PORT}"]
  topics   = ["xsphere/sensors/temperature/+/+/+"]
  qos      = 1
  retained = false

  [[inputs.mqtt_consumer.topic_parsing]]
    topic       = "xsphere/sensors/temperature/+/+/+"
    measurement = "temperature"
    tags        = "_/_/_/source/sensor_type/channel"

  data_format = "json_v2"
  [[inputs.mqtt_consumer.json_v2]]
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "value_k"
      type = "float"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "value_c"
      type = "float"

# ---------------------------------------------------------------------------
# Input 2: Pressure sensors (Setra 225 manometers)
# Topics : xsphere/sensors/pressure/{source}/{gauge}/{channel}
# Measurement: pressure
# Tags   : source, gauge, channel
# Fields : value (mbar)
# ---------------------------------------------------------------------------
[[inputs.mqtt_consumer]]
  servers  = ["tcp://${MQTT_HOST}:${MQTT_PORT}"]
  topics   = ["xsphere/sensors/pressure/+/+/+"]
  qos      = 1
  retained = false

  [[inputs.mqtt_consumer.topic_parsing]]
    topic       = "xsphere/sensors/pressure/+/+/+"
    measurement = "pressure"
    tags        = "_/_/_/source/gauge/channel"

  data_format = "json_v2"
  [[inputs.mqtt_consumer.json_v2]]
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "value"
      type = "float"

# ---------------------------------------------------------------------------
# Input 3: Vacuum gauges (PenningVAC full-range)
# Topics : xsphere/sensors/vacuum/{source}/{channel}
# Measurement: vacuum
# Tags   : source, channel
# Fields : value (mbar)
# ---------------------------------------------------------------------------
[[inputs.mqtt_consumer]]
  servers  = ["tcp://${MQTT_HOST}:${MQTT_PORT}"]
  topics   = ["xsphere/sensors/vacuum/+/+"]
  qos      = 1
  retained = false

  [[inputs.mqtt_consumer.topic_parsing]]
    topic       = "xsphere/sensors/vacuum/+/+"
    measurement = "vacuum"
    tags        = "_/_/_/source/channel"

  data_format = "json_v2"
  [[inputs.mqtt_consumer.json_v2]]
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "value"
      type = "float"

# ---------------------------------------------------------------------------
# Input 4: Liquid level sensors
# Topics : xsphere/sensors/level/{vessel}
# Measurement: level
# Tags   : vessel
# Fields : raw (0-10), filtered (0-10)
# ---------------------------------------------------------------------------
[[inputs.mqtt_consumer]]
  servers  = ["tcp://${MQTT_HOST}:${MQTT_PORT}"]
  topics   = ["xsphere/sensors/level/+"]
  qos      = 1
  retained = false

  [[inputs.mqtt_consumer.topic_parsing]]
    topic       = "xsphere/sensors/level/+"
    measurement = "level"
    tags        = "_/_/_/vessel"

  data_format = "json_v2"
  [[inputs.mqtt_consumer.json_v2]]
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "raw"
      type = "float"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "filtered"
      type = "float"

# ---------------------------------------------------------------------------
# Input 5: Environmental sensors (GHS panel: humidity, temperature, baro)
# Topics : xsphere/sensors/environment/ghs/{parameter}
# Measurement: environment
# Tags   : location, parameter
# Fields : value
# ---------------------------------------------------------------------------
[[inputs.mqtt_consumer]]
  servers  = ["tcp://${MQTT_HOST}:${MQTT_PORT}"]
  topics   = ["xsphere/sensors/environment/+/+"]
  qos      = 1
  retained = false

  [[inputs.mqtt_consumer.topic_parsing]]
    topic       = "xsphere/sensors/environment/+/+"
    measurement = "environment"
    tags        = "_/_/_/location/parameter"

  data_format = "json_v2"
  [[inputs.mqtt_consumer.json_v2]]
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "value"
      type = "float"

# ---------------------------------------------------------------------------
# Input 6: PID controller status
# Topics : xsphere/status/pid/{zone}
# Measurement: pid_state
# Tags   : zone (top | bottom | nozzle)
# Fields : setpoint_k, pv_k, output_pct, kp, ki, kd
# ---------------------------------------------------------------------------
[[inputs.mqtt_consumer]]
  servers  = ["tcp://${MQTT_HOST}:${MQTT_PORT}"]
  topics   = ["xsphere/status/pid/+"]
  qos      = 1
  retained = true   # PID status is published as retained

  [[inputs.mqtt_consumer.topic_parsing]]
    topic       = "xsphere/status/pid/+"
    measurement = "pid_state"
    tags        = "_/_/_/zone"

  data_format = "json_v2"
  [[inputs.mqtt_consumer.json_v2]]
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "setpoint_k"
      type = "float"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "pv_k"
      type = "float"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "output_pct"
      type = "float"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "kp"
      type = "float"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "ki"
      type = "float"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "kd"
      type = "float"

# ---------------------------------------------------------------------------
# Input 7: Solenoid valve status
# Topics : xsphere/status/valve/{vessel}
# Measurement: valve_state
# Tags   : vessel (cryostat | primary_xe | ballast)
# Fields : state, desired, auto_close, auto_open  (all 0/1 integers)
# ---------------------------------------------------------------------------
[[inputs.mqtt_consumer]]
  servers  = ["tcp://${MQTT_HOST}:${MQTT_PORT}"]
  topics   = ["xsphere/status/valve/+"]
  qos      = 1
  retained = true

  [[inputs.mqtt_consumer.topic_parsing]]
    topic       = "xsphere/status/valve/+"
    measurement = "valve_state"
    tags        = "_/_/_/vessel"

  data_format = "json_v2"
  [[inputs.mqtt_consumer.json_v2]]
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "state"
      type = "int"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "desired"
      type = "int"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "auto_close"
      type = "int"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "auto_open"
      type = "int"

# ---------------------------------------------------------------------------
# Input 8: Service heartbeat
# Topics : xsphere/status/service/heartbeat
# Measurement: service_heartbeat
# Fields : uptime_s
# ---------------------------------------------------------------------------
[[inputs.mqtt_consumer]]
  servers  = ["tcp://${MQTT_HOST}:${MQTT_PORT}"]
  topics   = ["xsphere/status/service/heartbeat"]
  qos      = 1
  retained = true

  data_format = "json_v2"
  [[inputs.mqtt_consumer.json_v2]]
    measurement_name = "service_heartbeat"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "uptime_s"
      type = "int"
