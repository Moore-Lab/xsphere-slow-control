# =============================================================================
# Telegraf configuration for xsphere slow control system
#
# Role: subscribe to all xsphere/# MQTT topics and write to InfluxDB 2.x.
#       Replaces the old Node-RED parse -> influxdb-node pipeline.
#
# Deploy (IOTstack / Docker): copy this file to
#   ~/IOTstack/volumes/telegraf/telegraf.conf and substitute the @PLACEHOLDER@
#   tokens with literal values (the IOTstack telegraf container is not given
#   these as environment variables):
#     @INFLUX_URL@    -> http://influxdb2:8086   (docker service name + internal port)
#     @INFLUX_TOKEN@  -> InfluxDB 2.x API token with write access to the bucket
#     @INFLUX_ORG@    -> the InfluxDB organisation name
#     @INFLUX_BUCKET@ -> the target bucket
#     @MQTT_HOST@     -> mosquitto
#     @MQTT_PORT@     -> 1883
#   Then: cd ~/IOTstack && docker compose restart telegraf
#
# Deploy (native apt telegraf): replace @VAR@ with ${VAR} and supply the
#   values via a systemd EnvironmentFile (see telegraf/.env.example).
#
# TOML / Telegraf gotchas baked into this layout:
#  - `data_format` must be a direct key of [[inputs.mqtt_consumer]] and appear
#    BEFORE the [[...topic_parsing]] / [[...json_v2]] sub-tables, else it is
#    parsed as a key of the preceding sub-table and the parser is ignored.
#  - In [[...topic_parsing]] the `topic`/`tags`/`fields`/`measurement` strings
#    must all have the same number of `/`-separated segments as `topic`. To set
#    a fixed measurement name we use `measurement_name` in the json_v2 parser
#    instead of `measurement` in topic_parsing.
#  - `retained` is NOT a valid mqtt_consumer option (telegraf consumes retained
#    messages by default).
#
# MQTT topic schema (published by the slowcontrol service + ESP32 firmware):
#   xsphere/sensors/temperature/{source}/{type}/{channel}  {"value_k":f,"value_c":f}
#   xsphere/sensors/pressure/{source}/{gauge}/{channel}    {"value":f}  [mbar]
#   xsphere/sensors/vacuum/{source}/{channel}              {"value":f}  [mbar]
#   xsphere/sensors/level/{vessel}                         {"raw":f,"filtered":f}
#   xsphere/sensors/environment/ghs/{parameter}            {"value":f}
#   xsphere/status/pid/{zone}        {"setpoint_k":f,"pv_k":f,"output_pct":f,"kp":f,"ki":f,"kd":f}
#   xsphere/status/valve/{vessel}    {"state":i,"desired":i,"auto_close":i,"auto_open":i}
#   xsphere/status/service/heartbeat {"uptime_s":i}
# Commands (xsphere/commands/#) are intentionally not stored.
# =============================================================================

[global_tags]
  system = "xsphere"

[agent]
  interval            = "5s"
  round_interval      = true
  metric_batch_size   = 1000
  metric_buffer_limit = 10000
  flush_interval      = "5s"
  precision           = "1s"
  omit_hostname       = true

# ---------------------------------------------------------------------------
# Output: InfluxDB v2
# ---------------------------------------------------------------------------
[[outputs.influxdb_v2]]
  urls         = ["@INFLUX_URL@"]
  token        = "@INFLUX_TOKEN@"
  organization = "@INFLUX_ORG@"
  bucket       = "@INFLUX_BUCKET@"

# ---------------------------------------------------------------------------
# Input 1: Temperature  xsphere/sensors/temperature/{source}/{type}/{channel}
# measurement=temperature  tags: source, sensor_type, channel  fields: value_k, value_c
# ---------------------------------------------------------------------------
[[inputs.mqtt_consumer]]
  servers     = ["tcp://@MQTT_HOST@:@MQTT_PORT@"]
  topics      = ["xsphere/sensors/temperature/+/+/+"]
  qos         = 1
  data_format = "json_v2"

  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "xsphere/sensors/temperature/+/+/+"
    tags  = "_/_/_/source/sensor_type/channel"

  [[inputs.mqtt_consumer.json_v2]]
    measurement_name = "temperature"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "value_k"
      type = "float"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "value_c"
      type = "float"

# ---------------------------------------------------------------------------
# Input 2: Pressure  xsphere/sensors/pressure/{source}/{gauge}/{channel}
# measurement=pressure  tags: source, gauge, channel  fields: value (mbar)
# ---------------------------------------------------------------------------
[[inputs.mqtt_consumer]]
  servers     = ["tcp://@MQTT_HOST@:@MQTT_PORT@"]
  topics      = ["xsphere/sensors/pressure/+/+/+"]
  qos         = 1
  data_format = "json_v2"

  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "xsphere/sensors/pressure/+/+/+"
    tags  = "_/_/_/source/gauge/channel"

  [[inputs.mqtt_consumer.json_v2]]
    measurement_name = "pressure"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "value"
      type = "float"

# ---------------------------------------------------------------------------
# Input 3: Vacuum  xsphere/sensors/vacuum/{source}/{channel}
# measurement=vacuum  tags: source, channel  fields: value (mbar)
# ---------------------------------------------------------------------------
[[inputs.mqtt_consumer]]
  servers     = ["tcp://@MQTT_HOST@:@MQTT_PORT@"]
  topics      = ["xsphere/sensors/vacuum/+/+"]
  qos         = 1
  data_format = "json_v2"

  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "xsphere/sensors/vacuum/+/+"
    tags  = "_/_/_/source/channel"

  [[inputs.mqtt_consumer.json_v2]]
    measurement_name = "vacuum"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "value"
      type = "float"

# ---------------------------------------------------------------------------
# Input 4: Liquid level  xsphere/sensors/level/{vessel}
# measurement=level  tags: vessel  fields: raw, filtered
# ---------------------------------------------------------------------------
[[inputs.mqtt_consumer]]
  servers     = ["tcp://@MQTT_HOST@:@MQTT_PORT@"]
  topics      = ["xsphere/sensors/level/+"]
  qos         = 1
  data_format = "json_v2"

  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "xsphere/sensors/level/+"
    tags  = "_/_/_/vessel"

  [[inputs.mqtt_consumer.json_v2]]
    measurement_name = "level"
    [[inputs.mqtt_consumer.json_v2.field]]
      path     = "raw"
      type     = "float"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      # The GHS ESP32 publishes ballast/primary_xe as {"raw": N} only;
      # the cryostat (from the PLC) sends both raw and filtered.
      path     = "filtered"
      type     = "float"
      optional = true

# ---------------------------------------------------------------------------
# Input 5: Environment  xsphere/sensors/environment/ghs/{parameter}
# measurement=environment  tags: location, parameter  fields: value
# ---------------------------------------------------------------------------
[[inputs.mqtt_consumer]]
  servers     = ["tcp://@MQTT_HOST@:@MQTT_PORT@"]
  topics      = ["xsphere/sensors/environment/+/+"]
  qos         = 1
  data_format = "json_v2"

  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "xsphere/sensors/environment/+/+"
    tags  = "_/_/_/location/parameter"

  [[inputs.mqtt_consumer.json_v2]]
    measurement_name = "environment"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "value"
      type = "float"

# ---------------------------------------------------------------------------
# Input 6: PID status  xsphere/status/pid/{zone}
# measurement=pid_state  tags: zone  fields: setpoint_k, pv_k, output_pct, kp, ki, kd
# ---------------------------------------------------------------------------
[[inputs.mqtt_consumer]]
  servers     = ["tcp://@MQTT_HOST@:@MQTT_PORT@"]
  topics      = ["xsphere/status/pid/+"]
  qos         = 1
  data_format = "json_v2"

  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "xsphere/status/pid/+"
    tags  = "_/_/_/zone"

  [[inputs.mqtt_consumer.json_v2]]
    measurement_name = "pid_state"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "setpoint_k"
      type = "float"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "pv_k"
      type = "float"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "output_pct"
      type = "float"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "kp"
      type = "float"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "ki"
      type = "float"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "kd"
      type = "float"

# ---------------------------------------------------------------------------
# Input 7: Valve status  xsphere/status/valve/{vessel}
# measurement=valve_state  tags: vessel  fields: state, desired, auto_close, auto_open
# ---------------------------------------------------------------------------
[[inputs.mqtt_consumer]]
  servers     = ["tcp://@MQTT_HOST@:@MQTT_PORT@"]
  topics      = ["xsphere/status/valve/+"]
  qos         = 1
  data_format = "json_v2"

  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "xsphere/status/valve/+"
    tags  = "_/_/_/vessel"

  [[inputs.mqtt_consumer.json_v2]]
    measurement_name = "valve_state"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "state"
      type = "int"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "desired"
      type = "int"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "auto_close"
      type = "int"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "auto_open"
      type = "int"

# ---------------------------------------------------------------------------
# Input 8: Service heartbeat  xsphere/status/service/heartbeat
# measurement=service_heartbeat  fields: uptime_s
# ---------------------------------------------------------------------------
[[inputs.mqtt_consumer]]
  servers     = ["tcp://@MQTT_HOST@:@MQTT_PORT@"]
  topics      = ["xsphere/status/service/heartbeat"]
  qos         = 1
  data_format = "json_v2"

  [[inputs.mqtt_consumer.json_v2]]
    measurement_name = "service_heartbeat"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "uptime_s"
      type = "int"
