; PlatformIO project configuration for the Xenon Gas Handling System
; (GHS) ESP32 sensor board.
;
; Boards used (verify against actual hardware):
;   - ESP32 dev module (38-pin)
;   - 2× ADS1115 16-bit ADC (I2C, addresses 0x48 and 0x49)
;   - DHT11 temperature/humidity sensor (GPIO 4)
;   - Adafruit BMP390 / BMP388 barometric pressure sensor (I2C)
;
; Flash with:
;   pio run -t upload

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

monitor_speed = 115200

lib_deps =
    adafruit/Adafruit BMP3XX Library @ ^2.1.4
    adafruit/DHT sensor library     @ ^1.4.6
    adafruit/Adafruit Unified Sensor @ ^1.1.14
    adafruit/Adafruit BusIO         @ ^1.16.1
    bblanchon/ArduinoJson           @ ^7.0.0
    knolleary/PubSubClient          @ ^2.8.0
    ; ADS1115 — using the ERE custom driver bundled in src/
    ; (same driver as original GHS firmware: Ads1115.h / Ads1115.cpp)
