; PlatformIO project configuration for the xsphere LN2 level sensor.
;
; One firmware image is used for all vessel level sensors.
; Set VESSEL_NAME in the build flags to match the physical installation:
;   "ballast"    → publishes xsphere/sensors/level/ballast
;   "primary_xe" → publishes xsphere/sensors/level/primary_xe
;
; The FDC1004 is a 4-channel capacitance-to-digital converter (I2C).
; For each vessel, one FDC1004 channel measures the coaxial capacitance
; probe submerged in the LN2.  The raw capacitance value in pF is
; published; level calibration is done in the Python autovalve controller.
;
; Flash with:
;   pio run -e ballast -t upload        (for the ballast level sensor)
;   pio run -e primary_xe -t upload     (for the primary_xe level sensor)

[env]
platform  = espressif32
board     = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    knolleary/PubSubClient              @ ^2.8.0
    bblanchon/ArduinoJson               @ ^7.0.0
    protocentral/ProtoCentral FDC1004 Capacitive Sensor Library @ ^2.0.0

[env:ballast]
build_flags =
    -D VESSEL_NAME=\"ballast\"
    -D MQTT_CLIENT_ID=\"xsphere-level-ballast\"
    -D FDC1004_CHANNEL=FDC1004_CHANNEL_0    ; VERIFY: which channel is wired

[env:primary_xe]
build_flags =
    -D VESSEL_NAME=\"primary_xe\"
    -D MQTT_CLIENT_ID=\"xsphere-level-primary-xe\"
    -D FDC1004_CHANNEL=FDC1004_CHANNEL_0    ; VERIFY: which channel is wired
