<?xml version="1.0" encoding="UTF-8"?>
<!--
  xsphere slow-control favicon

  A levitated-xenon cryostat shorthand. The blue disc and frosted six-spoke
  snowflake read "cold cryogenic vessel" at any size; the "Xe" centred on the
  disc makes the experiment unambiguous. Deliberately not a levitated symbol —
  this app is the slow-control system for the cryostat itself; levitation
  belongs to the separate fast-control DAQ.

  Kept to two colours (icy blue field + paler stroke) so the silhouette stays
  crisp at 16×16 in a browser tab and still reads at 512×512 on a touchscreen.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="xsphere">
  <!-- Cryostat dewar — cold blue disc -->
  <circle cx="32" cy="32" r="28" fill="#0e3a5f"/>
  <circle cx="32" cy="32" r="28" fill="none" stroke="#7cc3ff" stroke-width="2"/>

  <!-- Snowflake — six spokes with chevron tips, classic crystal silhouette -->
  <g stroke="#cce8ff" stroke-width="2" stroke-linecap="round" fill="none">
    <g>
      <line x1="32" y1="6"  x2="32" y2="58"/>
      <polyline points="26,12 32,6 38,12"/>
      <polyline points="26,52 32,58 38,52"/>
      <line x1="26" y1="20" x2="32" y2="20"/>
      <line x1="38" y1="20" x2="32" y2="20"/>
      <line x1="26" y1="44" x2="32" y2="44"/>
      <line x1="38" y1="44" x2="32" y2="44"/>
    </g>
    <g transform="rotate(60 32 32)">
      <line x1="32" y1="6"  x2="32" y2="58"/>
      <polyline points="26,12 32,6 38,12"/>
      <polyline points="26,52 32,58 38,52"/>
      <line x1="26" y1="20" x2="32" y2="20"/>
      <line x1="38" y1="20" x2="32" y2="20"/>
      <line x1="26" y1="44" x2="32" y2="44"/>
      <line x1="38" y1="44" x2="32" y2="44"/>
    </g>
    <g transform="rotate(120 32 32)">
      <line x1="32" y1="6"  x2="32" y2="58"/>
      <polyline points="26,12 32,6 38,12"/>
      <polyline points="26,52 32,58 38,52"/>
      <line x1="26" y1="20" x2="32" y2="20"/>
      <line x1="38" y1="20" x2="32" y2="20"/>
      <line x1="26" y1="44" x2="32" y2="44"/>
      <line x1="38" y1="44" x2="32" y2="44"/>
    </g>
  </g>

  <!-- Inner disc behind the Xe glyph, so "Xe" stays readable over the snowflake spokes -->
  <circle cx="32" cy="32" r="11" fill="#0e3a5f"/>
  <circle cx="32" cy="32" r="11" fill="none" stroke="#7cc3ff" stroke-width="1.2"/>

  <!-- Element symbol — kept geometric (no font dependency at favicon scale) -->
  <text x="32" y="38" text-anchor="middle"
        font-family="system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif"
        font-size="14" font-weight="700" fill="#eaf6ff">Xe</text>
</svg>
