<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>xsphere — register</title>
<link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
<style>
  :root { --bg:#11151c; --panel:#1b2230; --panel2:#232c3d; --fg:#dde3ee; --mut:#8a93a6;
          --ok:#3fb950; --warn:#d29922; --bad:#f85149; --acc:#58a6ff; --line:#2d3648; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--fg); font:14px/1.45 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif; }
  header { display:flex; align-items:center; gap:.8rem; flex-wrap:wrap; padding:.6rem 1rem;
           background:var(--panel); border-bottom:1px solid var(--line); position:sticky; top:0; z-index:5; }
  header h1 { font-size:1.1rem; margin:0 .4rem 0 0; font-weight:600; letter-spacing:.3px; }
  .pill { padding:.15rem .55rem; border-radius:999px; font-size:.78rem; font-weight:600; white-space:nowrap; }
  .pill.ok{background:rgba(63,185,80,.18);color:var(--ok)} .pill.bad{background:rgba(248,81,73,.18);color:var(--bad)}
  .pill.warn{background:rgba(210,153,34,.18);color:var(--warn)} .pill.mut{background:rgba(138,147,166,.15);color:var(--mut)}
  a.nav { color:var(--acc); font-size:.85rem; text-decoration:none; padding:.18rem .5rem; border:1px solid var(--line); border-radius:6px; }
  a.nav:hover { border-color:var(--acc); }
  main { display:grid; grid-template-columns:repeat(auto-fit,minmax(380px,1fr)); gap:1rem; padding:1rem; align-items:start; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:.7rem 1rem .9rem; }
  .card h2 { font-size:.95rem; margin:.1rem 0 .55rem; color:var(--acc); font-weight:600; letter-spacing:.3px; text-transform:capitalize; }
  table { width:100%; border-collapse:collapse; font-size:.85rem; }
  td,th { padding:.2rem .35rem; text-align:right; white-space:nowrap; vertical-align:baseline; }
  th { color:var(--mut); font-weight:600; }
  td:first-child,th:first-child { text-align:left; }
  tr+tr td { border-top:1px solid var(--line); }
  .num { font-variant-numeric:tabular-nums; }
  td.lbl { color:var(--fg); }
  tr.stale td.lbl, tr.stale td.val { color:var(--warn); }
  tr.invalid td.lbl, tr.invalid td.val { color:var(--mut); }
  td.extra { color:var(--mut); font-size:.8rem; }
  .dot { width:.62rem; height:.62rem; border-radius:50%; background:var(--mut); display:inline-block; vertical-align:middle; margin-right:.3rem; }
  .dot.on{background:var(--ok)} .dot.off{background:#444b5a}
  .frq { font-size:.68rem; padding:.05rem .3rem; border-radius:4px; }
  .frq.fresh{color:var(--ok);background:rgba(63,185,80,.12)} .frq.stale{color:var(--warn);background:rgba(210,153,34,.14)} .frq.invalid{color:var(--mut);background:rgba(138,147,166,.12)}
  small.hint { color:var(--mut); }
</style>
</head>
<body>
<header>
  <h1>xsphere&nbsp;·&nbsp;register</h1>
  <span id="p-svc" class="pill mut">service …</span>
  <span id="p-ilk" class="pill mut">interlocks …</span>
  <span id="p-lj"  class="pill mut">labjack …</span>
  <span id="p-ghs" class="pill mut">ghs …</span>
  <span id="p-mq"  class="pill mut">mqtt …</span>
  <span id="p-cnt" class="pill mut">…</span>
  <span id="p-age" class="pill mut" title="age of the last snapshot"></span>
  <span style="flex:1"></span>
  <a class="nav" href="/control">Control ↗</a>
  <a class="nav" href="/sequencer">Sequencer ↗</a>
  <a class="nav" href="/diag">Diag ↗</a>
  <a class="nav" href="/readme">README ↗</a>
  <a class="nav" href="http://192.168.8.116:3000/d/xsphere-slowcontrol" target="_blank">Grafana ↗</a>
</header>

<main id="main">
  <section class="card"><h2>Loading…</h2><small class="hint">waiting for the state snapshot from the slow-control service</small></section>
</main>

<script>
const $ = id => document.getElementById(id);
const GROUP_ORDER = ["temperature","derived","pid","gradient","level","valve","pressure","vacuum","environment","service"];

function fmtNum(v){
  if (v === null || v === undefined) return "–";
  if (typeof v !== "number") return String(v);
  const a = Math.abs(v);
  if (a === 0) return "0";
  if (a >= 1000) return v.toFixed(1);
  if (a >= 1)   return v.toFixed(2);
  if (a >= 0.01) return v.toFixed(3);
  return v.toExponential(2);
}
function fmtAge(s){ if(s==null) return ""; if(s<90) return s.toFixed(0)+"s"; if(s<5400) return (s/60).toFixed(0)+"m"; return (s/3600).toFixed(1)+"h"; }

function valCell(st){
  const f = st.freshness;
  if (st.kind === "binary"){
    if (st.value === null) return `<span class="dot off"></span><span class="num">–</span>`;
    const on = !!st.value;
    return `<span class="dot ${on?'on':'off'}"></span><span class="num">${on?'yes':'no'}</span>`;
  }
  if (st.kind === "analog"){
    const u = st.unit ? ` <span class="extra">${st.unit}</span>` : "";
    return `<span class="num">${fmtNum(st.value)}</span>${u}`;
  }
  // enum / text
  return `<span class="num">${st.value===null?'–':st.value}</span>`;
}
function extraCell(st){
  const bits = [];
  if (st.avg){ for (const [k,v] of Object.entries(st.avg)){ bits.push(`⌀${k.replace('avg_','')} ${fmtNum(v)}`); } }
  if (st.kind==="enum" && Array.isArray(st.values)) {/* values are obvious from value */}
  return bits.join(" · ");
}

function renderRegister(snap){
  const states = (snap && snap.states) || {};
  const byGroup = {};
  for (const st of Object.values(states)){ (byGroup[st.group] ||= []).push(st); }
  const groups = [...GROUP_ORDER.filter(g=>byGroup[g]), ...Object.keys(byGroup).filter(g=>!GROUP_ORDER.includes(g))];
  const main = $("main");
  main.innerHTML = groups.map(g=>{
    const rows = byGroup[g].map(st=>`
      <tr class="${st.freshness}">
        <td class="lbl">${st.label}</td>
        <td class="val num">${valCell(st)}</td>
        <td class="extra">${extraCell(st)}</td>
        <td><span class="frq ${st.freshness}">${st.freshness}</span></td>
      </tr>`).join("");
    return `<section class="card"><h2>${g}</h2><table>
      <thead><tr><th>state</th><th>value</th><th>avg / unit</th><th></th></tr></thead>
      <tbody>${rows}</tbody></table></section>`;
  }).join("") || `<section class="card"><h2>No states</h2><small class="hint">the snapshot is empty — is the slow-control service running?</small></section>`;
}

function svcPill(el, st, label, okText){
  if (!st){ el.textContent = label+" …"; el.className = "pill mut"; return; }
  if (st.value === null || st.freshness === "invalid"){ el.textContent = label+": ?"; el.className = "pill bad"; return; }
  const ok = !!st.value;
  el.textContent = label+": "+(ok ? okText : "DOWN");
  el.className = "pill " + (ok ? (st.freshness==="stale"?"warn":"ok") : "bad");
}

function header(d){
  const snap = d.snapshot || {}, st = snap.states || {};
  svcPill($("p-svc"), st.service_alive, "service", "alive");
  // interlocks: ok/alert (interlocks_ok is true when OK)
  const ilk = st.interlocks_ok;
  if (ilk && ilk.value !== null && ilk.freshness !== "invalid"){
    const ok = !!ilk.value; $("p-ilk").textContent = "interlocks: "+(ok?"OK":"ALERT"); $("p-ilk").className = "pill "+(ok?"ok":"bad");
  } else { $("p-ilk").textContent = "interlocks: ?"; $("p-ilk").className = "pill mut"; }
  svcPill($("p-lj"),  st.labjack_connected, "labjack", "ok");
  svcPill($("p-ghs"), st.ghs_esp32_alive,  "ghs",     "alive");
  $("p-mq").textContent = "mqtt: "+(d.mqtt_connected?"connected":"DOWN"); $("p-mq").className = "pill "+(d.mqtt_connected?"ok":"bad");
  const c = snap.counts || {};
  $("p-cnt").textContent = `${c.fresh||0} fresh · ${c.stale||0} stale · ${c.invalid||0} invalid`;
  $("p-cnt").className = "pill " + ((c.invalid||0)>0 ? "warn" : "mut");
  const age = d.snapshot_age;
  $("p-age").textContent = (age==null) ? "no snapshot" : ("snapshot "+fmtAge(age));
  $("p-age").className = "pill " + ((age==null||age>5)?"warn":"mut");
}

let lastGen = null;
async function tick(){
  let d;
  try { d = await (await fetch("/api/state")).json(); }
  catch(e){ $("p-mq").textContent="mqtt: page can't reach server"; $("p-mq").className="pill bad"; return; }
  header(d);
  const gen = d.snapshot && d.snapshot.generated_at;
  // re-render only when the snapshot actually changed (1 Hz from the service)
  if (gen !== lastGen){ lastGen = gen; renderRegister(d.snapshot); }
}
tick(); setInterval(tick, 1500);
</script>
</body>
</html>
