# xsphere slow control service configuration
# All values shown are defaults — uncomment and edit to override.

mqtt:
  host: 192.168.8.116    # xbox-pi IP
  port: 1883
  client_id: xsphere-slowcontrol
  keepalive: 60

# Direct InfluxDB writes are disabled by default — Telegraf handles ingestion.
influx:
  enabled: false
  url: http://192.168.8.116:8086
  token: ""
  org: xsphere
  bucket: xsphere

plc:
  host: 192.168.8.118    # CLICK PLC (Modbus TCP server, port 502)
  port: 502
  unit_id: 1
  poll_interval: 1.0     # seconds between Modbus reads
  timeout: 3.0

# Omega logger is no longer in use.

autovalve:
  # LN2 autofill is owned by the PLC ladder (it reads the analog level
  # inputs and decides when/how to open/close XV1/XV2/XV3). The Python
  # AutovalveController is an *optional* software state machine that would
  # do that logic itself from MQTT level readings — we keep it DISABLED so
  # there is a single autofill authority. High-level control (arm/disarm
  # autofill, manually command a valve) is done by writing the PLC's DS
  # registers via the xsphere/commands/valve/{vessel}/{state,auto_open,
  # auto_close} topics (handled by the PLC driver), and valve state is
  # published on xsphere/status/valve/{vessel}. The thresholds below are
  # only used if `enabled` is set true; the real ones live in the PLC.
  enabled: false
  vessels:
    cryostat:
      level_high: 2.5
      level_low: 0.25
      fill_timeout_s: 920
    primary_xe:
      level_high: 2.5
      level_low: 0.5
      fill_timeout_s: 600
    ballast:
      level_high: 2.5
      level_low: 0.5
      fill_timeout_s: 600

heartbeat_interval: 10.0    # seconds between heartbeat MQTT publishes
log_level: INFO
