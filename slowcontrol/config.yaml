# xsphere slow control service configuration
# All values shown are defaults — uncomment and edit to override.

mqtt:
  host: 192.168.8.116    # xbox-pi IP
  port: 1883
  client_id: xsphere-slowcontrol
  keepalive: 60

# Direct InfluxDB writes are disabled by default — Telegraf handles ingestion.
influx:
  enabled: false
  url: http://192.168.8.116:8086
  token: ""
  org: xsphere
  bucket: xsphere

plc:
  host: 192.168.8.118    # CLICK PLC (Modbus TCP server, port 502)
  port: 502
  unit_id: 1
  poll_interval: 1.0     # seconds between Modbus reads
  timeout: 3.0

# Omega logger is no longer in use.

autovalve:
  # Keep DISABLED until the level-sensor pF readings are calibrated and the
  # level_low/level_high thresholds below are set for pF units (see
  # VERIFICATION_CHECKLIST.md §3). With this false the controller still
  # publishes valve status but never commands a valve.
  enabled: false
  vessels:
    cryostat:
      level_high: 2.5       # close valve when filtered level > this
      level_low: 0.25       # open valve when filtered level < this
      fill_timeout_s: 920   # safety timeout (matches PLC ladder timer T3)
    primary_xe:
      level_high: 2.5
      level_low: 0.5
      fill_timeout_s: 600
    ballast:
      level_high: 2.5
      level_low: 0.5
      fill_timeout_s: 600

heartbeat_interval: 10.0    # seconds between heartbeat MQTT publishes
log_level: INFO
