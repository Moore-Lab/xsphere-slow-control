# xsphere slow control service configuration
# All values shown are defaults — uncomment and edit to override.

mqtt:
  host: 192.168.8.116    # xbox-pi IP
  port: 1883
  client_id: xsphere-slowcontrol
  keepalive: 60

# Direct InfluxDB writes are disabled by default — Telegraf handles ingestion.
influx:
  enabled: false
  url: http://192.168.8.116:8086
  token: ""
  org: xsphere
  bucket: xsphere

plc:
  host: 192.168.8.118    # CLICK PLC (Modbus TCP server, port 502)
  port: 502
  unit_id: 1
  poll_interval: 1.0     # seconds between Modbus reads
  timeout: 3.0
  # Safety interlocks on the LabJack → PLC PV mirror. See
  # PlcDriver._write_labjack_to_plc. These values are the *initial* limits
  # at first boot; the driver persists subsequent web-GUI changes to
  # slowcontrol/pv_interlock.json, which then takes precedence here.
  pv_stale_s: 10.0           # no LJ MQTT update for this many seconds ⇒ trip
  # Trip if any LJ RTD value falls outside [pv_min_k, pv_max_k]. Catches
  # runaway over-temp AND sensor faults that read absurd values (-100000 K).
  # Raise pv_max_k via the Control page's Interlock card when baking.
  pv_min_k: 77.0
  pv_max_k: 310.0
  pv_safe_surrogate_k: 500.0 # written to pv_raw on trip (must exceed any plausible SP)
  sp_safe_surrogate_k: 3.0   # written to SP on trip (must be below any plausible PV — three-leg defense: SP low + PV high + OUT_Control=0)

# Omega logger is no longer in use.

# Omega RDXL6SD-USB temperature logger — Modbus RTU over USB-serial.
# Wire type (TC vs RTD) and unit (°C/°F) are read live from the meter's
# configuration registers, so the operator only sets the channel number
# and label here.  Disconnected channels publish {"fault": true} every
# poll — easy to spot in the snapshot.
omega:
  enabled: true
  # FTDI bridge inside the RDXL6SD; serial-by-id symlink survives reboots
  # and USB-port-swaps, unlike /dev/ttyUSB<N> which depends on enumeration
  # order. If the device's USB serial changes (replacement unit), update
  # this path — `ls -la /dev/serial/by-id/` will show the new id.
  port: /dev/serial/by-id/usb-Omega_RDXL6SD-USB_0102-02856-if00-port0
  # Per the RDXL6SD-USB Modbus manual (Sept 2025).
  baud_rate: 57600
  stop_bits: 2
  modbus_address: 1
  poll_interval_s: 5.0
  channels:
    - {ch: 1, label: "Omega Ch-1"}
    - {ch: 2, label: "Omega Ch-2"}
    - {ch: 3, label: "Omega Ch-3"}
    - {ch: 4, label: "Omega Ch-4"}
    - {ch: 5, label: "Omega Ch-5"}
    - {ch: 6, label: "Omega Ch-6"}

autovalve:
  # LN2 autofill is owned by the PLC ladder (it reads the analog level
  # inputs and decides when/how to open/close XV1/XV2/XV3). The Python
  # AutovalveController is an *optional* software state machine that would
  # do that logic itself from MQTT level readings — we keep it DISABLED so
  # there is a single autofill authority. High-level control (arm/disarm
  # autofill, manually command a valve) is done by writing the PLC's DS
  # registers via the xsphere/commands/valve/{vessel}/{state,auto_open,
  # auto_close} topics (handled by the PLC driver), and valve state is
  # published on xsphere/status/valve/{vessel}. The thresholds below are
  # only used if `enabled` is set true; the real ones live in the PLC.
  enabled: false
  vessels:
    cryostat:
      level_high: 2.5
      level_low: 0.25
      fill_timeout_s: 920
    primary_xe:
      level_high: 2.5
      level_low: 0.5
      fill_timeout_s: 600
    ballast:
      level_high: 2.5
      level_low: 0.5
      fill_timeout_s: 600

# LabJack T7 — thermometry via the AIN extended features (the device does the
# PT100 conversion itself; type-K TCs are differential gradiometers, re-referenced
# in software to a nearby RTD).  Global RTD numbering: 1-3 on the LabJack, 4-6 on
# the PLC.  Topics: xsphere/sensors/temperature/labjack/{rtd|tc}/<channel>.
labjack:
  connection_type: ETHERNET
  device_identifier: "192.168.8.195"   # T7 serial 470037304 (DHCP)
  poll_interval_s: 1.0
  read_internal_temp: false            # the board temp is reported as each TC's cjc_k
  thermometry_channels:
    # RTDs — PT100, AINx_EF_INDEX=40, 4-wire, 200 µA current source
    - {name: rtd1, kind: rtd, ain: 0,  channel: 1, label: "nozzle"}
    - {name: rtd2, kind: rtd, ain: 2,  channel: 2, label: "top cube"}
    - {name: rtd3, kind: rtd, ain: 4,  channel: 3, label: "bottom cube"}
    # Type-K thermocouple gradiometers — AINx_EF_INDEX=22, re-referenced to an RTD.
    # delta_c (this end − reference) is the gradient; value_c is the absolute temp.
    - {name: tc1, kind: tc, ain: 6,  channel: 1, label: "cube left<->right",  reference: "rtd3"}       # bottom cube RTD
    - {name: tc2, kind: tc, ain: 8,  channel: 2, label: "LN vessel <-> base", reference: "plc/rtd/4"}  # base RTD
    - {name: tc3, kind: tc, ain: 10, channel: 3, label: "along nipple",       reference: "rtd1"}       # nozzle RTD
    - {name: tc4, kind: tc, ain: 12, channel: 4, label: "cube front<->back",  reference: "rtd3"}       # bottom cube RTD

heartbeat_interval: 10.0    # seconds between heartbeat MQTT publishes
# Layer 1 — MQTT self-watchdog: if the MQTT client hasn't successfully
# published in this many seconds (typically because paho is stuck queue-full
# after a network blip), the service exits non-zero so systemd restarts us
# with a fresh paho client. Set to 0 to disable.
watchdog_timeout_s: 60.0
# Layer 1.5 — per-driver poll-thread watchdog: a driver whose thread is alive
# but hasn't completed a poll() in this many seconds (typical cause: blocked
# Modbus call post-power-outage) is treated as stuck. Other threads' heart-
# beats keep the MQTT watchdog above satisfied, so this catches the half-
# dead state where the service looks alive but one driver isn't actually
# reading. Set to 0 to disable. See _heartbeat_loop in core/service.py.
driver_poll_watchdog_s: 60.0
log_level: INFO
